description: >-
  Cloudmersive provides a portfolio of utility APIs covering virus and
  malware scanning, document conversion, OCR, image recognition, NLP,
  validation, security threat detection (spam, phishing, fraud, DLP, CDR),
  speech, video, barcode, currency, and data integration. Each API is
  documented with a Swagger 2.0 / OpenAPI specification, has SDKs in
  multiple languages, and is consumable on api.cloudmersive.com behind an
  API key (`Apikey` header).
apis:
  - aid: cloudmersive:cloudmersive-virus-scan-api
    name: Cloudmersive Virus Scan API
    tags:
      - Antivirus
      - Malware
      - Security
      - Virus Scanning
    humanURL: https://cloudmersive.com/virus-api
    properties:
      - url: https://api-console.cloudmersive.com/swagger/index.html?urls.primaryName=Virus%20Scan%20API
        type: Documentation
      - url: https://api-console.cloudmersive.com/swagger/api/virus
        type: OpenAPI
      - url: openapi/cloudmersive-virus-scan-openapi.json
        type: OpenAPI
    description: >-
      Scan files and content for viruses, malware, executables, scripts,
      macros, password-protected files, and other content threats. Includes
      both basic and advanced (multi-engine) scan modes and a website scan.
  - aid: cloudmersive:cloudmersive-security-threat-detection-api
    name: Cloudmersive Security Threat Detection API
    tags:
