specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Cloudmersive
providerId: cloudmersive
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Documents
  - Conversions
  - OCR
  - Validation
  - Virus Scanning
  - Image Recognition
description: Cloudmersive prices its document, conversion, OCR, validation, and virus-scanning APIs as
  flat-rate monthly subscriptions with included monthly call quotas and a per-second concurrency cap. Plans
  are organized into Small Business, Medium Business, Enterprise, and Government bands. Calls in excess
  of the monthly allowance are queued rather than billed at an overage rate; higher throughput requires
  upgrading the plan or contacting sales.
sources:
  - https://www.cloudmersive.com/pricing
  - https://www.cloudmersive.com/pricing-small-business
plans:
  - id: cloudmersive-free
    name: Free
    type: freemium
    description: Free evaluation tier with a small monthly call allowance and a single-call-per-second concurrency
      ceiling.
    entries:
      - label: Monthly API Calls
        name: api_calls
        type: quota
        metric: requests
        limit: 600
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: rate
        metric: requests_per_second
        limit: 1
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Multi-tenant cloud
