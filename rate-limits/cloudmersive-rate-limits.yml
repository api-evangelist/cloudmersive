specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Cloudmersive
providerId: cloudmersive
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Documents
  - Conversions
  - OCR
  - Validation
  - Virus Scanning
  - Rate Limiting
description: Cloudmersive enforces concurrency limits per API key (calls-per-second) and a monthly call
  quota tied to the subscribed plan. Calls beyond the concurrency cap are queued for execution rather than
  rejected with 429s. Higher throughput requires a larger plan or a single-tenant / on-premises deployment.
sources:
  - https://www.cloudmersive.com/pricing-small-business
responseCodes:
  quotaExceeded: 402
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Free Tier Concurrency
    scope: api-key
    metric: requests_per_second
    limit: 1
    timeFrame: second
    notes: Free plan caps simultaneous calls to 1 per second; excess calls queue.
  - name: Basic / Business Concurrency
    scope: api-key
    metric: requests_per_second
    limit: 2
    timeFrame: second
    notes: Basic ($19.99/mo) and Business ($49.99/mo) plans share the 2 calls/second concurrency ceiling.
  - name: Business Premier Concurrency
    scope: api-key
    metric: requests_per_second
    limit: 3
    timeFrame: second
  - name: Business Advantage Concurrency
    scope: api-key
    metric: requests_per_second
    limit: 4
    timeFrame: second
  - name: Free Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 600
    timeFrame: month
  - name: Basic Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 10000
    timeFrame: month
  - name: Business Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 25000
    timeFrame: month
  - name: Business Premier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 50000
    timeFrame: month
  - name: Business Advantage Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
  - name: Enterprise / Government Concurrency
    scope: contract
    metric: requests_per_second
    limit: see vendor sales
    notes: Single-tenant cloud, on-premises, and government deployments support negotiated throughput.
policies:
  - name: Queueing on Concurrency
    description: Calls in excess of the per-second concurrency ceiling are queued for execution rather than
      rejected immediately; sustained over-subscription results in degraded latency.
  - name: Plan Quota Enforcement
    description: Once the monthly call quota is exhausted the API key is blocked until the next billing
      cycle or until the plan is upgraded.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and respect any Retry-After header
      returned with 429 responses.
  - name: Single-tenant / On-premises
    description: For higher concurrency or strict isolation, customers deploy single-tenant cloud or on-premises
      stacks where limits are sized to the host hardware.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
